<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Card UI</title>
  <link rel="stylesheet" href="acti.css" />
</head>
<body>

  <div class="container">

    <!-- Card 1 -->
    <div class="card">
      <span class="badge">Nearest Seller</span>

      <div class="imgBox">
        <img src="https://pngimg.com/uploads/headphones/headphones_PNG7647.png" alt="Headset">
      </div>

      <div class="content">
        <h2>Wireless bluetooth headset</h2>
        <p class="ship">Shipped in 3-4 days</p>

        <div class="price">$35.99</div>

        <div class="buttons">
          <button class="cartBtn">🛒 Add<br>Cart</button>
          <button class="buyBtn">👜 Buy</button>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <span class="badge">Nearest Seller</span>

      <div class="imgBox">
        <img src="https://pngimg.com/uploads/headphones/headphones_PNG7647.png" alt="Headset">
      </div>

      <div class="content">
        <h2>Wireless bluetooth headset</h2>
        <p class="ship">Shipped in 3-4 days</p>

        <div class="price">$35.99</div>

        <div class="buttons">
          <button class="cartBtn">🛒 Add<br>Cart</button>
          <button class="buyBtn">👜 Buy</button>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
